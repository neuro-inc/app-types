{{- if .Values.networkPolicy.enable }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "app.fullname" . | trunc 50 }}-ae
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      job-name: {{ include "app.fullname" . }}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 169.254.0.0/16
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8443
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 6443
    {{- if .Values.networkPolicy.allowPlatformIngress }}
    # Allow hook pods to reach platform Traefik directly for dev hairpin flows
    # (api.dev.apolo.us -> LB -> back into cluster -> Traefik).
    #
    # Traefik Service exposes 443 but forwards to targetPort 8443. When hairpin
    # routing occurs, some CNIs evaluate egress after DNAT, so the connection
    # may be seen as podIP:8443 instead of LB:443.
    #
    # To avoid relying on ipBlock behavior, we explicitly allow traffic to Traefik pods via label selectors.
    # For egress, ipBlock IPs may or may not be subject to ipBlock-based policies:
    # https://kubernetes.io/docs/concepts/services-networking/network-policies/#behavior-of-to-and-from-selectors
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: traefik
              app.kubernetes.io/name: traefik
      ports:
        # Verify Service -> backend port mapping:
        # kubectl -n platform get svc traefik -o yaml | rg -n "name:|port:|targetPort:"
        # Verify Traefik entrypoint port:
        # kubectl -n platform get deploy traefik -o yaml | rg -n "websecure"
        - protocol: TCP
          port: 8443
        - protocol: TCP
          port: 443 #keep this port for another possible CNI implementation
    {{- end }}
{{- end }}
